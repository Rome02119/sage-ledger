<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#F6F7F4">
  <title>Sage Ledger — your money, at a glance</title>
  <meta name="description" content="A minimal personal finance planner: budgets, bills, credit cards, goals.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Public+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%236B7C5E'/%3E%3Ctext x='16' y='22' font-size='17' text-anchor='middle' fill='%23fff' font-family='Georgia'%3E%24%3C/text%3E%3C/svg%3E">
</head>
<body>

  <!-- ===================== AUTH ===================== -->
  <div id="auth-screen">
    <canvas id="auth-canvas" aria-hidden="true"></canvas>
    <div id="auth-card">
      <div class="logo-mark" aria-hidden="true">$</div>
      <h1 class="auth-title">Sage Ledger</h1>
      <p class="auth-sub">Budgets, bills, cards, and goals — one calm white page.</p>
      <div class="auth-buttons">
        <button class="btn btn--auth" data-act="auth-google" id="btn-google"><svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true"><path fill="#4285F4" d="M23.5 12.27c0-.85-.08-1.66-.22-2.45H12v4.64h6.45a5.52 5.52 0 0 1-2.39 3.62v3h3.87c2.26-2.09 3.57-5.16 3.57-8.81z"/><path fill="#34A853" d="M12 24c3.24 0 5.96-1.07 7.93-2.91l-3.87-3a7.18 7.18 0 0 1-10.8-3.78H1.27v3.1A12 12 0 0 0 12 24z"/><path fill="#FBBC05" d="M5.26 14.3a7.2 7.2 0 0 1 0-4.6V6.6H1.27a12 12 0 0 0 0 10.8l3.99-3.1z"/><path fill="#EA4335" d="M12 4.75c1.77 0 3.35.61 4.6 1.8l3.43-3.43A11.97 11.97 0 0 0 1.27 6.6l3.99 3.1A7.18 7.18 0 0 1 12 4.75z"/></svg>Continue with Google</button>
        <button class="btn btn--auth btn--email-toggle" data-act="auth-email-toggle" id="btn-email-toggle">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="M3 7l9 6 9-6"/></svg>
          Sign in with email
        </button>
      </div>
      <div id="auth-email-form"></div>
      <button class="auth-skip" data-act="auth-skip">Continue without an account &rarr;</button>
      <p class="auth-note">Your data stays on this device when using guest mode.</p>
    </div>
  </div>

  <!-- ===================== APP ===================== -->
  <div id="app">
    <aside class="sidebar" aria-label="Primary">
      <div class="logo-mark logo-mark--sm" title="Sage Ledger">$</div>
      <nav class="side-nav">
        <button data-nav="home" class="is-active" aria-label="Dashboard"><span class="nav-ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M3 11.5 12 4l9 7.5"/><path d="M5.5 10.5V20h13v-9.5"/><path d="M10 20v-5h4v5"/></svg></span><small>Home</small><i class="nav-badge" hidden></i></button>
        <button data-nav="activity" aria-label="Transactions"><span class="nav-ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M4 17l4-6 3.5 3L16 8l4 5"/><path d="M4 21h16"/></svg></span><small>Activity</small></button>
        <button data-nav="budget" aria-label="Budget"><span class="nav-ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="8.5"/><path d="M12 12V3.5"/><path d="M12 12l6 6"/></svg></span><small>Budget</small></button>
        <button data-nav="cards" aria-label="Cards"><span class="nav-ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="6" width="18" height="13" rx="2.5"/><path d="M3 10.5h18"/><path d="M7 15.5h4"/></svg></span><small>Cards</small></button>
        <button data-nav="goals" aria-label="Goals"><span class="nav-ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="8.5"/><circle cx="12" cy="12" r="4.5"/><circle cx="12" cy="12" r="1"/></svg></span><small>Goals</small></button>
        <button data-nav="settings" aria-label="Settings"><span class="nav-ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3.2"/><path d="M12 3v2.6M12 18.4V21M3 12h2.6M18.4 12H21M5.6 5.6l1.9 1.9M16.5 16.5l1.9 1.9M18.4 5.6l-1.9 1.9M7.5 16.5l-1.9 1.9"/></svg></span><small>Settings</small></button>
      </nav>
      <span id="demo-chip" class="demo-chip" hidden title="Demo data is loaded — clear it in Settings">demo</span>
    </aside>

    <main>
      <section class="view" id="view-home"></section>
      <section class="view" id="view-activity" hidden></section>
      <section class="view" id="view-budget" hidden></section>
      <section class="view" id="view-cards" hidden></section>
      <section class="view" id="view-goals" hidden></section>
      <section class="view" id="view-settings" hidden></section>
    </main>

    <!-- mobile tab bar -->
    <nav class="tabbar" aria-label="Primary mobile">
      <button data-nav="home" class="is-active"><span class="nav-ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M3 11.5 12 4l9 7.5"/><path d="M5.5 10.5V20h13v-9.5"/><path d="M10 20v-5h4v5"/></svg></span><small>Home</small><i class="nav-badge" hidden></i></button>
      <button data-nav="activity"><span class="nav-ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M4 17l4-6 3.5 3L16 8l4 5"/><path d="M4 21h16"/></svg></span><small>Activity</small></button>
      <button class="tab-fab" data-act="open-sheet" aria-label="Add"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg></button>
      <button data-nav="cards"><span class="nav-ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="6" width="18" height="13" rx="2.5"/><path d="M3 10.5h18"/><path d="M7 15.5h4"/></svg></span><small>Cards</small></button>
      <button data-nav="budget"><span class="nav-ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="8.5"/><path d="M12 12V3.5"/><path d="M12 12l6 6"/></svg></span><small>Budget</small></button>
    </nav>

    <!-- desktop FAB -->
    <button class="fab" data-act="open-sheet" aria-label="Add money or files">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
    </button>
  </div>

  <!-- ===================== OVERLAYS ===================== -->
  <div id="sheet" hidden>
    <div class="sheet-panel" role="dialog" aria-label="Add">
      <div class="sheet-grab"></div>
      <h2>Add to your ledger</h2>
      <div class="sheet-grid">
        <button class="sheet-opt" data-act="sheet-manual"><span class="sheet-ic sheet-ic--sage"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"><path d="M5 19l1-4L16.5 4.5a1.8 1.8 0 0 1 2.6 0l.4.4a1.8 1.8 0 0 1 0 2.6L9 18z"/></svg></span><strong>Type it in</strong><small>Income or spending</small></button>
        <button class="sheet-opt" data-act="sheet-camera"><span class="sheet-ic sheet-ic--earth"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M4 8h3l2-2.5h6L17 8h3v11H4z"/><circle cx="12" cy="13" r="3.4"/></svg></span><strong>Snap a receipt</strong><small>Camera</small></button>
        <button class="sheet-opt" data-act="sheet-upload"><span class="sheet-ic sheet-ic--sage"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M7 3h7l4 4v14H7z"/><path d="M14 3v4h4"/></svg></span><strong>Upload files</strong><small>Photos or PDF statements</small></button>
        <button class="sheet-opt" data-act="sheet-csv"><span class="sheet-ic sheet-ic--earth"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M7 3h7l4 4v14H7z"/><path d="M9.5 12h5M9.5 15.5h5"/></svg></span><strong>Import CSV</strong><small>Bank or card export</small></button>
      </div>
      <button class="btn btn--ghost btn--block" data-act="close-sheet">Cancel</button>
    </div>
  </div>

  <div id="modal" hidden>
    <div class="modal-panel" role="dialog" aria-labelledby="modal-title">
      <header class="modal-head">
        <h2 id="modal-title"></h2>
        <button class="mini-btn" data-close aria-label="Close"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"><path d="M6 6l12 12M18 6L6 18"/></svg></button>
      </header>
      <div id="modal-body"></div>
    </div>
  </div>

  <div id="toast-stack" aria-live="polite"></div>
  <div id="fx-layer" aria-hidden="true"></div>
  <div id="fx-vignette" aria-hidden="true"></div>

  <!-- hidden file inputs -->
  <input type="file" id="file-camera" accept="image/*" capture="environment" hidden>
  <input type="file" id="file-any" accept="image/*,application/pdf,.csv" multiple hidden>
  <input type="file" id="file-csv" accept=".csv,text/csv" hidden>

  <!-- Firebase (compat SDK — no bundler required) -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

  <!-- CDN enhancements (app degrades gracefully without them) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js" defer></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.158.0/three.min.js" defer></script>

  <script src="js/firebase-config.js" defer></script>
  <script src="js/store.js" defer></script>
  <script src="js/logic.js" defer></script>
  <script src="js/charts.js" defer></script>
  <script src="js/animations.js" defer></script>
  <script src="js/upload.js" defer></script>
  <script src="js/ui.js" defer></script>
  <script src="js/auth.js" defer></script>
  <script src="js/app.js" defer></script>
</body>
</html>
